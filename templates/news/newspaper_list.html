{% extends "base.html" %}

{% block content %}
  {% if newspaper_list %}
    <h1>Newspapers:</h1>
    <a href="{% url 'news:newspaper-create' %}" class="btn btn-primary link-to-page">
      Create
    </a>
    <ul>
      {% for newspaper in newspaper_list %}
        <li>
          <a href="{% url 'news:newspaper-detail' pk=newspaper.id %}">{{ newspaper }}</a> ({{ newspaper.content }})
        </li>
      {% endfor %}
    </ul>
    {% else %}
      <p>There are no newspapers in news agency!</p>
  {% endif %}
{% endblock %}
