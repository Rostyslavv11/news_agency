{% extends "base.html" %}

{% block content %}
  <form method="post">
    {% csrf_token %}
    <h1>Do you want to delete newspaper {{ newspaper.title }}?</h1>
    <button type="submit" class="btn btn-danger">YES</button>
    <a href="{% url 'news:newspaper-list' %}" class="btn btn-secondary">NO</a>
  </form>
{% endblock %}
