{% load static %}

<header>
  <!-- NAVBAR (top) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="{% url 'news:index' %}">
        <img src="{% static 'images/favicon.ico' %}" alt="logo" height="28" class="me-2">
        <span class="fw-semibold">News Agency</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar_global"
              aria-controls="navbar_global" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbar_global">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="{% url 'news:index' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'news:topic-list' %}">Topics</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'news:newspaper-list' %}">Newspapers</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'news:redactor-list' %}">Redactors</a></li>
          <li class="nav-item"><a class="nav-link" href="https://github.com/Rostyslavv11/news_agency" target="_blank">GitHub</a></li>

          {% if user.is_authenticated %}
            <li class="nav-item ms-lg-3">
              <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button class="btn btn-outline-light btn-sm">🚪 Log out</button>
              </form>
            </li>
          {% else %}
            <li class="nav-item ms-lg-3">
              <a class="btn btn-primary btn-sm" href="{% url 'login' %}">🔑 Log in</a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <!-- CURVE / WAVE UNDER NAV (nice shape) -->
  <div class="header-shape bg-dark">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" style="display:block; width:100%; height:60px;">
      <path d="M0,96 L80,88 C160,80 320,64 480,58.7 C640,53 800,59 960,64 C1120,69 1280,74 1360,77.3 L1440,80 L1440,0 L1360,0 C1280,0 1120,0 960,0 C800,0 640,0 480,0 C320,0 160,0 80,0 L0,0 Z" 
            fill="#0d6efd"></path>
    </svg>
  </div>
</header>
